name: validate skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: List skills (parses every SKILL.md)
        run: npx --yes skills add ./ --list

      - name: Verify required frontmatter (name + description)
        shell: bash
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            if ! awk '/^---$/{c++} c==1 && /^name:[[:space:]]+[a-z][a-z0-9-]*[[:space:]]*$/{n=1} c==1 && /^description:[[:space:]]+\S/{d=1} END{exit !(n && d)}' "$f"; then
              echo "::error file=$f::SKILL.md missing valid lowercase-hyphen name or description"
              fail=1
            fi
          done < <(find skills -name SKILL.md)
          exit $fail
